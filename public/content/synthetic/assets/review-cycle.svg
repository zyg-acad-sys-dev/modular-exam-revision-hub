<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Review cycle diagram">
  <rect width="960" height="540" rx="32" fill="#0f172a"/>
  <text x="60" y="78" fill="#e2e8f0" font-size="32" font-weight="800">Learning-Science Review Cycle</text>
  <g fill="#38bdf8" font-size="24" font-weight="700" text-anchor="middle">
    <circle cx="220" cy="260" r="82" fill="#0ea5e9" opacity="0.22" stroke="#38bdf8" stroke-width="4"/>
    <text x="220" y="255">Encode</text><text x="220" y="285" font-size="16">concept card</text>
    <circle cx="480" cy="170" r="82" fill="#22c55e" opacity="0.22" stroke="#4ade80" stroke-width="4"/>
